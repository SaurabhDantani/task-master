# dev-docker-compose.yaml
services:
  my-app:
    build: .
    container_name: task-master
    command: npm run start
    ports:
      - "3000:3000"
    restart: always
    working_dir: /app
    volumes:
      - .:/app
      - node_modules_volume:/app/node_modules
    depends_on:
      - redis
    env_file:
      - .env  
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      
  redis:
    image: "redis:alpine"
    container_name: redis
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data

volumes:
  node_modules_volume:
  redis_data: